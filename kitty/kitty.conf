font_family      MesloLGM Nerd Font
bold_font        MesloLGM Nerd Font Bold
italic_font      MesloLGM Nerd Font Italic
bold_italic_font MesloLGM Nerd Font Bold Italic
font_size        14.0

modify_font cell_height 150%
modify_font strikethrough_position 150%

window_margin_width     10
# background_image        none
# background_image_layout scaled
# background_tint         0.97
# background_tint_gaps    -10.0

window_border_width     1pt
active_border_color     #44ffff

single_window_margin_width 0
enabled_layouts Tall, *
macos_option_as_alt yes
tab_bar_style       powerline
tab_powerline_style slanted

# cursor_blink_interval 0
# window_padding_width 10
# hide_window_decorations yes
# wayland_titlebar_color background
remember_window_size yes
initial_window_width 1680
initial_window_height 1000
enable_audio_bell no

# BEGIN_KITTY_THEME
include theme/catppuccin_frappe.conf
# END_KITTY_THEME
